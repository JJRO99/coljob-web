<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColJob | Próximamente</title>
    <style>
        /* --- ESTILOS GENERALES Y COLORES ELEGANTES --- */
        :root {
            --naranja: #FF6600;
            --naranja-suave: rgba(255, 102, 0, 0.1);
            --negro: #000000;
            --blanco: #FFFFFF;
            --gris-oscuro: #111111;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--negro);
            color: var(--blanco);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; /* Tipografía limpia */
            overflow: hidden; /* Importante para el efecto del cursor */
            display: flex; justify-content: center; align-items: center;
        }

        /* --- EFECTO INTERACTIVO DE LUZ (CURSOR) --- */
        #cursor-light {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,102,0,0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none; /* No interfiere con clics */
            transform: translate(-50%, -50%);
            z-index: 1;
            transition: width 0.3s ease, height 0.3s ease;
        }

        /* --- CONTENEDOR PRINCIPAL MINIMALISTA --- */
        .main-container {
            text-align: center;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 1.5s ease-out forwards;
        }

        /* --- ESTILOS DEL LOGO --- */
        .logo-container {
            margin-bottom: 50px;
        }

        .logo-final {
            max-width: 150px;
            height: auto;
            /* Sin animaciones exageradas, solo una sutil sombra */
            filter: drop-shadow(0 0 5px rgba(255, 102, 0, 0.2));
            transition: transform 0.5s ease;
        }

        /* Micro-interacción: El logo se aleja sutilmente del cursor */
        .logo-container:hover .logo-final {
            transform: scale(1.03);
        }

        /* --- TIPOGRAFÍA Y TEXTOS --- */
        h1 {
            font-size: 1.2rem;
            font-weight: 300; /* Delgada y elegante */
            text-transform: uppercase;
            letter-spacing: 8px; /* Mucho espacio entre letras */
            margin: 0 0 20px 0;
            color: rgba(255, 255, 255, 0.7);
        }

        h1 span {
            color: var(--blanco);
            font-weight: 500;
        }

        .coming-soon {
            font-size: 3.5rem;
            font-weight: 700;
            margin: 0 0 60px 0;
            line-height: 1.1;
        }

        /* --- BOTÓN INTERACTIVO Y ELEGANTE --- */
        .btn-notify {
            background-color: transparent;
            color: var(--blanco);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 15px 40px;
            font-size: 0.9rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 0; /* Bordes rectos y minimalistas */
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        /* Micro-interacción: El botón se llena de naranja al pasar el mouse */
        .btn-notify::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 0;
            background-color: var(--naranja);
            z-index: -1;
            transition: height 0.4s ease;
        }

        .btn-notify:hover {
            border-color: var(--naranja);
            color: var(--negro);
        }

        .btn-notify:hover::after {
            height: 100%;
        }

        /* --- EFECTO DE ONDA EXPANSIVA AL CLIC --- */
        .click-ripple {
            position: fixed;
            border-radius: 50%;
            background-color: var(--naranja);
            pointer-events: none;
            transform: scale(0);
            z-index: 9999;
            opacity: 0.7;
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* --- ANIMACIONES CSS --- */
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Responsividad */
        @media (max-width: 600px) {
            .coming-soon { font-size: 2.2rem; }
            h1 { font-size: 1rem; letter-spacing: 4px; }
            .logo-final { max-width: 120px; }
        }
    </style>
</head>
<body>

    <div id="cursor-light"></div>

    <div class="main-container">
        
        <div class="logo-container">
            <img src="logo_ColJob.png" alt="Logo ColJob" class="logo-final">
        </div>

        <h1>Próximamente <span>ColJob</span></h1>
        
        <p class="coming-soon">El nuevo<br>estándar laboral.</p>

        <button class="btn-notify" id="notify-btn">
            Avísame
        </button>

    </div>

    <script>
        // 1. Efecto del Foco de Luz que sigue al Cursor
        const light = document.getElementById('cursor-light');
        document.addEventListener('mousemove', (e) => {
            light.style.left = e.clientX + 'px';
            light.style.top = e.clientY + 'px';
        });

        // 2. Micro-interacción: Agrandar el foco al pasar sobre el botón
        const btn = document.getElementById('notify-btn');
        btn.addEventListener('mouseenter', () => {
            light.style.width = '550px';
            light.style.height = '550px';
        });
        btn.addEventListener('mouseleave', () => {
            light.style.width = '400px';
            light.style.height = '400px';
        });

        // 3. Efecto de Onda Expansiva (Ripple) al hacer Clic en el botón
        btn.addEventListener('click', function(e) {
            // Crear el elemento de la onda
            const ripple = document.createElement('div');
            ripple.classList.add('click-ripple');
            
            // Posicionar la onda en el centro del clic
            const size = 100; // Tamaño inicial
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - size / 2) + 'px';
            ripple.style.top = (e.clientY - size / 2) + 'px';
            
            // Añadir la animación y duración
            ripple.style.animation = 'ripple-animation 0.8s ease-out';
            
            // Añadir al cuerpo y borrar después de la animación
            document.body.appendChild(ripple);
            setTimeout(() => {
                ripple.remove();
                alert('¡Gracias! Te avisaremos cuando ColJob esté listo.');
            }, 800);
        });
    </script>

</body>
</html>
