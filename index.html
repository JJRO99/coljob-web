<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColJob | Compilation in Progress</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- VARIABLES DE COLORES ELEGANTES --- */
        :root {
            --negro: #000000;
            --negro-suave: #0a0a0a;
            --blanco: #ffffff;
            --naranja: #ff6a00; /* Naranja Silicon Valley */
            --naranja-conectar: rgba(255, 106, 0, 0.9); /* Brillo intenso */
            --fuente-principal: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--negro);
            color: var(--blanco);
            font-family: var(--fuente-principal);
            -webkit-font-smoothing: antialiased;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- FONDO DE RED NEURONAL (PARTICLES.JS) --- */
        #particles-js {
            position: fixed;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: 1;
            background-image: radial-gradient(circle at center, var(--negro-suave) 0%, var(--negro) 100%);
            transition: filter 0.3s ease; /* Para un ligero desenfoque al conectar */
        }

        /* Clase que se activa con el clic para iluminar la red */
        #particles-js.connecting {
            filter: blur(1px) brightness(1.2); /* Sutil desenfoque y brillo */
        }

        /* --- CONTENEDOR PRINCIPAL MINIMALISTA --- */
        .main-container {
            text-align: center;
            z-index: 10;
            padding: 50px;
            max-width: 90%;
            width: 550px;
            opacity: 0;
            animation: fadeInSlight 1.5s ease-out forwards;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- ESTILOS DEL LOGO --- */
        .logo-container {
            margin-bottom: 50px;
        }

        .logo-final {
            max-width: 160px; /* Tamaño ajustable del logo */
            height: auto;
            filter: drop-shadow(0 0 10px rgba(255, 106, 0, 0.3));
        }

        /* --- TIPOGRAFÍA Y TEXTOS EN INGLÉS --- */
        h1 {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.3;
            letter-spacing: -0.5px;
            margin: 0 0 20px 0;
            color: var(--blanco);
        }

        p {
            font-size: 1.1rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            margin: 0 0 60px 0;
            line-height: 1.6;
        }

        /* --- BOTÓN 'CLICK HERE' (DISEÑO DE ALTURA) --- */
        .btn-facade {
            background-color: transparent;
            color: var(--blanco);
            border: 1px solid rgba(255, 255, 255, 0.15); /* Borde casi invisible */
            padding: 16px 45px;
            font-size: 0.95rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 3px; /* Mucho espacio entre letras */
            border-radius: 2px; /* Bordes muy rectos */
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1); /* Transición premium */
        }

        /* Micro-interacción: Una línea naranja que se llena desde el centro */
        .btn-facade::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            width: 0; height: 2px;
            background-color: var(--naranja);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            transform: translateX(-50%);
        }

        .btn-facade:hover {
            border-color: rgba(255, 106, 0, 0.5);
            color: var(--naranja);
            letter-spacing: 4px; /* Las letras se separan sutilmente */
            box-shadow: 0 0 20px rgba(255, 106, 0, 0.1);
        }

        .btn-facade:hover::after {
            width: 100%;
        }

        /* Micro-interacción: El texto sube ligeramente al hover */
        .btn-facade span {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .btn-facade:hover span {
            transform: translateY(-2px);
        }

        /* --- ANIMACIONES CSS --- */
        @keyframes fadeInSlight {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsividad para móviles */
        @media (max-width: 600px) {
            h1 { font-size: 1.6rem; margin-bottom: 15px; }
            p { font-size: 1rem; margin-bottom: 45px; }
            .logo-final { max-width: 130px; }
            .btn-facade { padding: 14px 35px; font-size: 0.85rem; }
            .main-container { padding: 30px; }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="main-container">
        
        <div class="logo-container">
            <img src="logo_ColJob.png" alt="ColJob Logo" class="logo-final">
        </div>

        <h1>The future of work is compiling.</h1>
        
        <p>The first version is coming soon.</p>

        <button class="btn-facade" id="connect-btn">
            <span>Click Here</span>
        </button>

    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // 1. Configuración de Particles.js (Red Neuronal Ultra-Minimalista)
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 100, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" }, // Color de los nodos
                "shape": { "type": "circle" },
                "opacity": { "value": 0.15, "random": false }, // Nodos casi invisibles
                "size": { "value": 2, "random": true },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#ffffff", // Color de las líneas
                    "opacity": 0.08, // Líneas ultra-sutiles por defecto
                    "width": 1
                },
                "move": { "enable": true, "speed": 1, "out_mode": "out" }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": false } },
                "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 0.3 } } }
            },
            "retina_detect": true
        });

        // 2. Interacción de Clic de Alto Impacto (Conectar Red Neuronal)
        const btn = document.getElementById('connect-btn');
        const particlesContainer = document.getElementById('particles-js');

        btn.addEventListener('click', function() {
            // A) Activar el efecto visual de "Conexión"
            particlesContainer.classList.add('connecting');
            
            // B) Modificar dinámicamente la configuración de particles.js para iluminar la red
            // Esto accede internamente a la instancia y cambia los valores
            if (window.pJSDom && window.pJSDom[0]) {
                const pJS = window.pJSDom[0].pJS;
                
                // Iluminar nodos y líneas
                pJS.particles.line_linked.color = "#ff6a00"; // Cambiar a naranja
                pJS.particles.line_linked.opacity = 0.9; // Brillo máximo
                pJS.particles.line_linked.width = 2; // Líneas más gruesas
                pJS.particles.color.value = "#ff6a00"; // Nodos naranjas
                
                // Redibujar la red con los nuevos valores
                pJS.fn.particlesRefresh();
            }

            // C) Desactivar el efecto después de 3 segundos
            setTimeout(() => {
                particlesContainer.classList.remove('connecting');
                
                // Restaurar los valores originales
                if (window.pJSDom && window.pJSDom[0]) {
                    const pJS = window.pJSDom[0].pJS;
                    pJS.particles.line_linked.color = "#ffffff";
                    pJS.particles.line_linked.opacity = 0.08;
                    pJS.particles.line_linked.width = 1;
                    pJS.particles.color.value = "#ffffff";
                    pJS.fn.particlesRefresh();
                }
            }, 3000); // 3 segundos de conexión neuronal máxima
        });
    </script>

</body>
</html>
