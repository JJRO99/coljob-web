<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColJob</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;cursor:none!important}
html,body{width:100%;height:100%;background:#03030a;overflow:hidden;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
canvas{position:absolute;inset:0;width:100%;height:100%}

#ui{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:2;pointer-events:none;
  gap:0;
}
button{pointer-events:all!important}

/* bloque ARRIBA del logo */
.top-block{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:22px;
}
.ey{font-size:.56rem;font-weight:500;letter-spacing:.4em;text-transform:uppercase;
  color:rgba(255,255,255,.22);margin-bottom:10px;
  opacity:0;animation:fu .7s ease .1s forwards}
.ey b{color:#ff6a00;font-weight:600}
.line-top{font-size:clamp(1.1rem,2.4vw,1.65rem);font-weight:300;line-height:1.6;
  text-align:center;color:rgba(255,255,255,.88);letter-spacing:-.02em;
  opacity:0;animation:fu .85s ease .28s forwards}
.line-top strong{font-weight:500;color:#fff}

/* espacio del logo — canvas lo dibuja ahí, pero dejamos un hueco visual */
.logo-gap{
  width:80px;height:80px;
  flex-shrink:0;
}

/* bloque ABAJO del logo */
.bot-block{
  display:flex;flex-direction:column;align-items:center;
  margin-top:22px;
}
.line-bot{font-size:clamp(1.1rem,2.4vw,1.65rem);font-weight:300;line-height:1.6;
  text-align:center;color:rgba(255,255,255,.88);letter-spacing:-.02em;
  opacity:0;animation:fu .85s ease .45s forwards}
.line-bot em{font-style:normal;color:#ff6a00}
.sub{margin-top:8px;font-size:.62rem;color:rgba(255,255,255,.15);letter-spacing:.16em;
  opacity:0;animation:fu .85s ease .6s forwards}
.cta{margin-top:20px;opacity:0;animation:fu .85s ease .78s forwards}

button{display:inline-flex;align-items:center;gap:8px;padding:10px 26px;
  background:transparent;border:1px solid rgba(255,106,0,.3);border-radius:2px;
  color:rgba(255,106,0,.85);font-family:inherit;font-size:.66rem;font-weight:600;
  letter-spacing:.24em;text-transform:uppercase;overflow:hidden;position:relative;
  outline:none;transition:color .28s;z-index:0}
button::before{content:'';position:absolute;inset:0;background:#ff6a00;
  transform:scaleX(0);transform-origin:left;
  transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:-1}
button:hover::before{transform:scaleX(1)}
button:hover{color:#03030a}
button:active{transform:scale(.97)}
.rr{width:9px;height:9px;border:1.3px solid currentColor;border-radius:50%;
  position:relative;flex-shrink:0;transition:transform .3s}
.rr::after{content:'';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);width:2.5px;height:2.5px;
  border-radius:50%;background:currentColor}
button:hover .rr{transform:rotate(90deg)}

#tip{position:fixed;pointer-events:none;z-index:20;
  background:rgba(3,3,10,.9);border:1px solid rgba(255,106,0,.28);
  border-radius:3px;padding:6px 13px;font-size:.59rem;letter-spacing:.08em;
  color:rgba(255,255,255,.78);white-space:nowrap;
  opacity:0;transition:opacity .18s;
  transform:translate(-50%,-100%) translateY(-12px)}
#tip.show{opacity:1}

@keyframes fu{to{opacity:1;transform:translateY(0)}}
.ey,.line-top,.line-bot,.sub,.cta{transform:translateY(7px)}

#cur{position:fixed;width:4px;height:4px;border-radius:50%;background:#ff6a00;
  pointer-events:none;z-index:999;transform:translate(-50%,-50%)}
#cur-r{position:fixed;width:22px;height:22px;border-radius:50%;
  border:1px solid rgba(255,106,0,.22);pointer-events:none;z-index:998;
  transform:translate(-50%,-50%);transition:width .2s,height .2s,border-color .2s}
#cur-r.hover{width:40px;height:40px;border-color:rgba(255,106,0,.55)}
</style>
</head>
<body>
<div id="cur"></div>
<div id="cur-r"></div>
<canvas id="c"></canvas>
<div id="tip"></div>

<div id="ui">
  <!-- TEXTO ARRIBA del logo -->
  <div class="top-block">
    <p class="ey"><b>Col</b>Job &nbsp;&middot;&nbsp; Beta</p>
    <p class="line-top">El futuro del trabajo</p>
  </div>

  <!-- HUECO donde el canvas dibuja el sol/logo -->
  <div class="logo-gap" id="logo-gap"></div>

  <!-- TEXTO ABAJO del logo -->
  <div class="bot-block">
    <p class="line-bot"><strong>se est&aacute; <em>compilando.</em></strong></p>
    <p class="sub">v0.1.0 &mdash; building in public</p>
    <div class="cta">
      <button id="btn"><span class="rr"></span><span id="bl">Inicializar</span></button>
    </div>
  </div>
</div>

// Estrellas
var STARS=160,stars=[];
for(var i=0;i<STARS;i++){
  stars.push({x:Math.random(),y:Math.random(),r:.2+Math.random()*.9,
    a:.04+Math.random()*.22,tp:Math.random()*Math.PI*2,tf:.006+Math.random()*.01});
}

// Planetas
var TRAIL=65;
var PLANETS=[
  {name:'Full Remote',    desc:'No borders, no limits',  orb:90,  size:7,   speed:.0075,angle:.5,  color:'#7ab8f5',moons:1,trail:[],hovered:false,px:0,py:0},
  {name:'Time',  desc:'Your pace, always', orb:138, size:8.5, speed:.005, angle:2.2, color:'#f5c96a',moons:2,trail:[],hovered:false,px:0,py:0},
  {name:'Organization',   desc:'Order that empowers',   orb:184, size:6,   speed:.0033,angle:4.1, color:'#7ee8a2',moons:0,trail:[],hovered:false,px:0,py:0},
  {name:'International Projects', desc:'Real global impact',   orb:232, size:10,  speed:.0021,angle:1.2, color:'#e89070',moons:2,trail:[],belt:true,hovered:false,px:0,py:0},
  {name:'Technology',    desc:'Future in motion',orb:278, size:7.5, speed:.0014,angle:3.8, color:'#c09af0',moons:1,trail:[],hovered:false,px:0,py:0}
];
PLANETS.forEach(function(p){
  p.moonData=[];
  for(var i=0;i<(p.moons||0);i++){
    p.moonData.push({angle:(i/(p.moons||1))*Math.PI*2,
      orb:p.size*2.7+i*5,size:1.2+Math.random()*.7,speed:.017+Math.random()*.012});
  }
});

// Asteroides
var belt=[];
for(var i=0;i<34;i++){
  belt.push({angle:Math.random()*Math.PI*2,orb:216+Math.random()*28,
    speed:(.0013+Math.random()*.0008)*(Math.random()<.5?1:-1),
    size:.5+Math.random()*1.1,a:.09+Math.random()*.17});
}

var fxParts=[];
function spawnFx(x,y){
  for(var i=0;i<20;i++){
    var a=Math.random()*Math.PI*2,s=.7+Math.random()*2.4;
    fxParts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-.9,r:1.3+Math.random()*2,life:1});
  }
}
function hex2rgba(hex,a){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

var t=0,hoveredPlanet=null;

function draw(){
  ct.clearRect(0,0,W,H);
  t++;
  sx+=(mx-sx)*.07;sy+=(my-sy)*.07;
  cur.style.left=mx+'px';cur.style.top=my+'px';
  curR.style.left=sx+'px';curR.style.top=sy+'px';

  // estrellas
  for(var i=0;i<stars.length;i++){
    var s=stars[i];
    var tw=Math.sin(t*s.tf+s.tp)*.5+.5;
    ct.beginPath();ct.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    ct.fillStyle='rgba(255,255,255,'+((s.a*(0.55+tw*.45)).toFixed(2))+')';
    ct.fill();
  }

  // orbitas
  for(var i=0;i<PLANETS.length;i++){
    var p=PLANETS[i];
    ct.beginPath();ct.arc(CX,CY,p.orb,0,Math.PI*2);
    ct.strokeStyle=p.hovered?'rgba(255,255,255,.09)':'rgba(255,255,255,.036)';
    ct.lineWidth=p.hovered?.45:.28;
    ct.setLineDash([3,9]);ct.stroke();ct.setLineDash([]);
  }

  // asteroides
  for(var i=0;i<belt.length;i++){
    var a=belt[i];
    a.angle+=a.speed;
    ct.beginPath();ct.arc(CX+Math.cos(a.angle)*a.orb,CY+Math.sin(a.angle)*a.orb,a.size,0,Math.PI*2);
    ct.fillStyle='rgba(165,150,130,'+a.a.toFixed(2)+')';ct.fill();
  }

  // planetas
  hoveredPlanet=null;
  for(var i=0;i<PLANETS.length;i++){
    var p=PLANETS[i];
    p.angle+=p.speed;
    p.px=CX+Math.cos(p.angle)*p.orb;
    p.py=CY+Math.sin(p.angle)*p.orb;
    p.trail.push({x:p.px,y:p.py});
    if(p.trail.length>TRAIL)p.trail.shift();

    var dx=sx-p.px,dy=sy-p.py,dd=Math.sqrt(dx*dx+dy*dy);
    p.hovered=(dd<p.size*2.8);
    if(p.hovered){hoveredPlanet=p;curR.classList.add('hover');}

    // trail
    for(var j=1;j<p.trail.length;j++){
      var alpha=(j/p.trail.length)*(p.hovered?.2:.06);
      ct.beginPath();ct.moveTo(p.trail[j-1].x,p.trail[j-1].y);ct.lineTo(p.trail[j].x,p.trail[j].y);
      ct.strokeStyle=hex2rgba(p.color,alpha.toFixed(3));
      ct.lineWidth=p.hovered?1:.4;ct.stroke();
    }

    // anillos
    if(p.belt){
      ct.save();ct.translate(p.px,p.py);ct.rotate(p.angle*.25+.6);
      ct.beginPath();ct.ellipse(0,0,p.size*2.4,p.size*.58,0,0,Math.PI*2);
      ct.strokeStyle=hex2rgba(p.color,.28);ct.lineWidth=1.5;ct.stroke();
      ct.beginPath();ct.ellipse(0,0,p.size*2.9,p.size*.7,0,0,Math.PI*2);
      ct.strokeStyle=hex2rgba(p.color,.14);ct.lineWidth=.8;ct.stroke();
      ct.restore();
    }

    // halo hover
    if(p.hovered){
      ct.beginPath();ct.arc(p.px,p.py,p.size+8+Math.sin(t*.07)*2,0,Math.PI*2);
      ct.strokeStyle=hex2rgba(p.color,.22);ct.lineWidth=.8;ct.stroke();
    }

    // cuerpo
    var ps=p.hovered?1+Math.sin(t*.09)*.04:1;
    ct.beginPath();ct.arc(p.px,p.py,p.size*ps,0,Math.PI*2);
    ct.fillStyle=p.color;ct.fill();
    ct.beginPath();ct.arc(p.px-p.size*.3,p.py-p.size*.3,p.size*.42,0,Math.PI*2);
    ct.fillStyle='rgba(255,255,255,'+(p.hovered?.15:.07)+')';ct.fill();

    // lunas
    for(var j=0;j<p.moonData.length;j++){
      var m=p.moonData[j];
      m.angle+=m.speed;
      var mlx=p.px+Math.cos(m.angle)*m.orb,mly=p.py+Math.sin(m.angle)*m.orb;
      ct.beginPath();ct.arc(mlx,mly,m.size,0,Math.PI*2);
      ct.fillStyle='rgba(255,255,255,'+(p.hovered?.5:.2)+')';ct.fill();
      ct.beginPath();ct.arc(p.px,p.py,m.orb,0,Math.PI*2);
      ct.strokeStyle='rgba(255,255,255,'+(p.hovered?.05:.018)+')';ct.lineWidth=.28;ct.stroke();
    }

    // label
    if(p.hovered){
      ct.font='500 11px Inter,system-ui,sans-serif';
      ct.fillStyle='rgba(255,255,255,.7)';
      ct.textAlign='center';ct.textBaseline='top';
      ct.fillText(p.name,p.px,p.py+p.size*ps+10);
    }
  }

  if(!hoveredPlanet)curR.classList.remove('hover');

  // SOL — logo ColJob
  var sunR=36;
  var pulse=Math.sin(t*.032)*.5+.5;
  // coronas
  var coronas=[sunR+20+pulse*5,sunR+11+pulse*2.5,sunR+4+pulse];
  for(var i=0;i<coronas.length;i++){
    ct.beginPath();ct.arc(CX,CY,coronas[i],0,Math.PI*2);
    ct.strokeStyle='rgba(255,106,0,'+(.065-.018*i+pulse*.028).toFixed(3)+')';
    ct.lineWidth=.65;ct.stroke();
  }
  // clip logo
  ct.save();
  ct.beginPath();ct.arc(CX,CY,sunR,0,Math.PI*2);ct.clip();
  if(logoImg.complete&&logoImg.naturalWidth>0){
    ct.drawImage(logoImg,CX-sunR,CY-sunR,sunR*2,sunR*2);
  } else {
    ct.fillStyle='#ff6a00';ct.fill();
  }
  ct.restore();
  // borde
  ct.beginPath();ct.arc(CX,CY,sunR,0,Math.PI*2);
  ct.strokeStyle='rgba(255,106,0,'+(.5+pulse*.25).toFixed(2)+')';
  ct.lineWidth=1.2;ct.stroke();

  // tooltip
  if(hoveredPlanet){
    tip.textContent=hoveredPlanet.name+' · '+hoveredPlanet.desc;
    tip.style.left=hoveredPlanet.px+'px';
    tip.style.top=(hoveredPlanet.py-hoveredPlanet.size-8)+'px';
    tip.classList.add('show');
  } else {
    tip.classList.remove('show');
  }

  // fx
  fxParts=fxParts.filter(function(p){
    p.x+=p.vx;p.y+=p.vy;p.vy+=.04;p.life-=.025;
    if(p.life<=0)return false;
    ct.beginPath();ct.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ct.fillStyle='rgba(255,106,0,'+((p.life*.7).toFixed(2))+')';ct.fill();
    return true;
  });

  requestAnimationFrame(draw);
}

cv.addEventListener('click',function(){
  if(hoveredPlanet)spawnFx(hoveredPlanet.px,hoveredPlanet.py);
});

// recalcular CX/CY cada frame por si el layout cambia al animar
setInterval(function(){
  var rect=gap.getBoundingClientRect();
  CX=rect.left+rect.width/2;
  CY=rect.top+rect.height/2;
},500);

draw();

var btn=document.getElementById('btn'),bl=document.getElementById('bl'),busy=false;
btn.addEventListener('click',function(){
  if(busy)return;busy=true;bl.textContent='Conectando...';
  setTimeout(function(){bl.textContent='Sistema activo';},1800);
  setTimeout(function(){bl.textContent='Inicializar';busy=false;},4200);
});
})();
</script>
