<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColJob — El futuro del trabajo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--orange:#ff6a00}
*{cursor:none!important}
html,body{width:100%;height:100%;background:#080808;color:#fff;font-family:'Inter',system-ui,sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}

#cur{position:fixed;pointer-events:none;z-index:9999;width:6px;height:6px;border-radius:50%;background:var(--orange);transform:translate(-50%,-50%);transition:width .12s,height .12s}
#cur-r{position:fixed;pointer-events:none;z-index:9998;width:26px;height:26px;border-radius:50%;border:1px solid rgba(255,106,0,.3);transform:translate(-50%,-50%);transition:width .22s,height .22s,border-color .22s}
#cur-r.hover{width:44px;height:44px;border-color:rgba(255,106,0,.6)}

canvas#bg{position:fixed;inset:0;z-index:0}

.scene{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;pointer-events:none}
.scene button{pointer-events:all}

.logo-wrap{margin-bottom:1rem;opacity:0;transform:translateY(-10px) scale(.92);animation:rS 1s cubic-bezier(.4,0,.2,1) .1s forwards}
.logo-img{width:64px;height:auto;filter:drop-shadow(0 0 10px rgba(255,106,0,.3));transition:filter .4s,transform .4s}
.logo-img:hover{filter:drop-shadow(0 0 22px rgba(255,106,0,.65));transform:scale(1.07)}

.wm{display:flex;align-items:center;gap:.55rem;margin-bottom:2rem;opacity:0;transform:translateY(-8px);animation:ri .9s ease .3s forwards}
.wm-d{width:7px;height:7px;border-radius:50%;background:var(--orange);animation:bd 2.6s ease-in-out infinite 2.5s}
@keyframes bd{0%,100%{box-shadow:0 0 8px rgba(255,106,0,.7)}50%{box-shadow:0 0 2px rgba(255,106,0,.15)}}
.wm-t{font-size:1rem;font-weight:700;letter-spacing:.3em;text-transform:uppercase}
.wm-t span{color:var(--orange)}
.wm-sep{width:1px;height:15px;background:rgba(255,255,255,.14)}
.wm-tag{font-size:.58rem;letter-spacing:.18em;color:rgba(255,255,255,.26);text-transform:uppercase}

.headline{max-width:480px;font-size:clamp(1.15rem,3vw,1.72rem);font-weight:300;line-height:1.68;letter-spacing:-.01em;color:rgba(255,255,255,.9);opacity:0;transform:translateY(14px);animation:ri 1s ease .55s forwards}
.headline em{font-style:normal;font-weight:600;color:#fff}
.headline .acc{color:var(--orange);font-weight:500}
.pdot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--orange);margin-right:.4rem;vertical-align:middle;position:relative;top:-1px;animation:pd 2.8s ease-in-out infinite 2.2s}
@keyframes pd{0%,100%{box-shadow:0 0 0 0 rgba(255,106,0,.5)}50%{box-shadow:0 0 0 8px rgba(255,106,0,0)}}

.sub{margin-top:.85rem;font-size:.7rem;color:rgba(255,255,255,.2);letter-spacing:.1em;opacity:0;animation:ri 1s ease .85s forwards}

.cta{margin-top:2rem;opacity:0;animation:ri 1s ease 1.05s forwards}
#btn{position:relative;display:inline-flex;align-items:center;gap:.55rem;padding:.8rem 2.2rem;background:transparent;border:1px solid rgba(255,106,0,.4);border-radius:2px;color:var(--orange);font-family:inherit;font-size:.72rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;overflow:hidden;outline:none;transition:color .3s;z-index:0}
#btn::before{content:'';position:absolute;inset:0;background:var(--orange);transform:scaleX(0);transform-origin:left;transition:transform .36s cubic-bezier(.4,0,.2,1);z-index:-1}
#btn:hover::before{transform:scaleX(1)}
#btn:hover{color:#080808}
#btn:active{transform:scale(.97)}
.br{width:11px;height:11px;border:1.5px solid currentColor;border-radius:50%;position:relative;flex-shrink:0;transition:transform .35s}
.br::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:3px;height:3px;border-radius:50%;background:currentColor}
#btn:hover .br{transform:rotate(90deg)}

.foot{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%);font-size:.6rem;letter-spacing:.13em;color:rgba(255,255,255,.1);z-index:3;white-space:nowrap;opacity:0;animation:ri 1s ease 1.8s forwards}

.rl{position:fixed;inset:0;pointer-events:none;z-index:9}
.rp{position:absolute;border-radius:50%;border:1px solid rgba(255,106,0,.45);transform:translate(-50%,-50%) scale(0);animation:ro 1.4s cubic-bezier(.2,.6,.4,1) forwards}
@keyframes ro{0%{transform:translate(-50%,-50%) scale(0);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}

@keyframes ri{to{opacity:1;transform:translateY(0)}}
@keyframes rS{to{opacity:1;transform:translateY(0) scale(1)}}

@media(max-width:520px){.wm-sep,.wm-tag{display:none}.logo-img{width:50px}.headline{font-size:1.08rem}}
</style>
</head>
<body>
<div id="cur"></div>
<div id="cur-r"></div>
<canvas id="bg"></canvas>
<div class="rl" id="rl"></div>

<div class="scene">
  <div class="logo-wrap">
    <img class="logo-img" src="https://via.placeholder.com/64x64/ff6a00/ffffff?text=CJ" alt="ColJob"/>
  </div>
  <div class="wm">
    <div class="wm-d"></div>
    <div class="wm-t">Col<span>Job</span></div>
    <div class="wm-sep"></div>
    <div class="wm-tag">Beta</div>
  </div>
  <h1 class="headline">
    <span class="pdot"></span>
    El futuro del trabajo<br>
    se está <em>compilando.</em><br>
    <span class="acc">Pronto liberamos</span> la primera versión.
  </h1>
  <p class="sub">v0.1.0 — building in public</p>
  <div class="cta">
    <button id="btn"><span class="br"></span><span id="bl">Inicializar</span></button>
  </div>
</div>

<div class="foot">© 2025 ColJob · All systems loading</div>

<script>
(function(){
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
let W=window.innerWidth,H=window.innerHeight;
canvas.width=W;canvas.height=H;

const OG='rgba(255,106,0,';
let mx=W/2,my=H/2,cx=W/2,cy=H/2;

/* Cursor */
const dot=document.getElementById('cur'),ring=document.getElementById('cur-r');
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
(function tc(){
  dot.style.left=mx+'px';dot.style.top=my+'px';
  cx+=(mx-cx)*.14;cy+=(my-cy)*.14;
  ring.style.left=cx+'px';ring.style.top=cy+'px';
  requestAnimationFrame(tc);
})();
document.addEventListener('mousedown',()=>{dot.style.width='10px';dot.style.height='10px';});
document.addEventListener('mouseup',()=>{dot.style.width='6px';dot.style.height='6px';});

/* Grid de puntos */
const COLS=30,ROWS=18;
let pts=[];
function initGrid(){
  pts=[];
  const gw=W/(COLS-1),gh=H/(ROWS-1);
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    pts.push({
      bx:c*gw,by:r*gh,x:c*gw,y:r*gh,
      phase:Math.random()*Math.PI*2,
      speed:.004+Math.random()*.003,
      amp:1.6+Math.random()*2.4,
      baseAlpha:.055+Math.random()*.07,
      r:.7+Math.random()*.7,
    });
  }
}
initGrid();
window.addEventListener('resize',()=>{W=window.innerWidth;H=window.innerHeight;canvas.width=W;canvas.height=H;initGrid();initLines();initRings();initParts();});

/* Líneas de flujo */
const LCOUNT=14;
let lines=[];
function makeLine(init,idx){
  const side=Math.floor(Math.random()*4);
  let sx,sy,angle;
  if(side===0){sx=Math.random()*W;sy=0;angle=Math.PI/2+(.5-Math.random())*.9;}
  else if(side===1){sx=W;sy=Math.random()*H;angle=Math.PI+(.5-Math.random())*.9;}
  else if(side===2){sx=Math.random()*W;sy=H;angle=-Math.PI/2+(.5-Math.random())*.9;}
  else{sx=0;sy=Math.random()*H;angle=(.5-Math.random())*.9;}
  lines[idx]={
    x:sx,y:sy,angle,
    speed:.2+Math.random()*.2,
    len:55+Math.random()*100,
    alpha:0,
    targetAlpha:.2+Math.random()*.18,
    life:0,
    maxLife:260+Math.random()*240,
    orange:Math.random()<.16,
    delay:init?Math.floor(Math.random()*200):0,
  };
}
function initLines(){lines=[];for(let i=0;i<LCOUNT;i++)makeLine(true,i);}
initLines();

/* Anillos de pulso */
const RCOUNT=5;
let rings=[];
function makeRing(init,idx){
  rings[idx]={
    x:W*.12+Math.random()*W*.76,
    y:H*.12+Math.random()*H*.76,
    r:0,maxR:80+Math.random()*90,
    alpha:0,phase:'grow',
    age:init?-Math.floor((idx/RCOUNT)*400):0,
    orange:Math.random()<.12,
  };
}
function initRings(){rings=[];for(let i=0;i<RCOUNT;i++)makeRing(true,i);}
initRings();

/* Partículas flotantes */
const PCOUNT=24;
let parts=[];
function makePart(init,idx){
  parts[idx]={
    x:Math.random()*W,
    y:init?Math.random()*H:H+8,
    vy:-.15-Math.random()*.15,
    vx:(Math.random()-.5)*.06,
    r:.5+Math.random()*.9,
    alpha:0,maxAlpha:.14+Math.random()*.12,
    life:0,maxLife:300+Math.random()*280,
    age:init?-Math.floor(Math.random()*300):0,
    orange:Math.random()<.1,
  };
}
function initParts(){parts=[];for(let i=0;i<PCOUNT;i++)makePart(true,i);}
initParts();

let t=0;
function draw(){
  ctx.clearRect(0,0,W,H);
  t++;

  /* Puntos */
  pts.forEach(p=>{
    const wave=Math.sin(t*p.speed+p.phase)*p.amp;
    const wave2=Math.cos(t*p.speed*.7+p.phase*1.3)*p.amp*.6;
    p.x=p.bx+wave;p.y=p.by+wave2;
    const dx=mx-p.x,dy=my-p.y,d=Math.sqrt(dx*dx+dy*dy);
    const infl=Math.max(0,1-d/150);
    const a=p.baseAlpha+infl*.38;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*(1+infl),0,Math.PI*2);
    ctx.fillStyle=infl>.12?OG+a.toFixed(2)+')':`rgba(255,255,255,${a.toFixed(2)})`;
    ctx.fill();
  });

  /* Líneas */
  lines.forEach((l,i)=>{
    if(l.delay>0){l.delay--;return;}
    l.life++;
    if(l.life<50) l.alpha=l.targetAlpha*(l.life/50);
    else if(l.life>l.maxLife-50) l.alpha=l.targetAlpha*((l.maxLife-l.life)/50);
    else l.alpha=l.targetAlpha;
    if(l.life>l.maxLife){makeLine(false,i);return;}
    const ex=l.x+Math.cos(l.angle)*l.len,ey=l.y+Math.sin(l.angle)*l.len;
    ctx.beginPath();ctx.moveTo(l.x,l.y);ctx.lineTo(ex,ey);
    ctx.strokeStyle=l.orange?OG+l.alpha.toFixed(2)+')':`rgba(255,255,255,${l.alpha.toFixed(2)})`;
    ctx.lineWidth=.55;ctx.stroke();
    l.x+=Math.cos(l.angle)*l.speed;l.y+=Math.sin(l.angle)*l.speed;
  });

  /* Anillos */
  rings.forEach((rg,i)=>{
    rg.age++;
    if(rg.age<0) return;
    if(rg.phase==='grow'){
      rg.r+=.5;rg.alpha=Math.min(.16,(rg.r/rg.maxR)*.16);
      if(rg.r>=rg.maxR) rg.phase='fade';
    } else {
      rg.alpha-=.0035;rg.r+=.18;
      if(rg.alpha<=0) makeRing(false,i);
    }
    if(rg.alpha<=0) return;
    ctx.beginPath();ctx.arc(rg.x,rg.y,rg.r,0,Math.PI*2);
    ctx.strokeStyle=rg.orange?OG+rg.alpha.toFixed(3)+')':`rgba(255,255,255,${rg.alpha.toFixed(3)})`;
    ctx.lineWidth=.65;ctx.stroke();
  });

  /* Partículas */
  parts.forEach((p,i)=>{
    p.age++;
    if(p.age<0) return;
    p.life++;p.x+=p.vx;p.y+=p.vy;
    if(p.life<35) p.alpha=p.maxAlpha*(p.life/35);
    else if(p.life>p.maxLife-35) p.alpha=p.maxAlpha*((p.maxLife-p.life)/35);
    else p.alpha=p.maxAlpha;
    if(p.life>p.maxLife){makePart(false,i);return;}
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.orange?OG+p.alpha.toFixed(3)+')':`rgba(255,255,255,${p.alpha.toFixed(3)})`;
    ctx.fill();
  });

  /* Conexiones del cursor */
  const near=[];
  pts.forEach(p=>{const dx=mx-p.x,dy=my-p.y,d=Math.sqrt(dx*dx+dy*dy);if(d<110)near.push({p,d});});
  near.sort((a,b)=>a.d-b.d).slice(0,5).forEach(({p,d})=>{
    const a=(1-d/110)*.16;
    ctx.beginPath();ctx.moveTo(mx,my);ctx.lineTo(p.x,p.y);
    ctx.strokeStyle=OG+a.toFixed(3)+')';ctx.lineWidth=.45;ctx.stroke();
  });

  requestAnimationFrame(draw);
}
draw();

/* Ripples */
const rl=document.getElementById('rl');
function ripples(x,y){
  [0,150,320].forEach(d=>setTimeout(()=>{
    const el=document.createElement('div');el.className='rp';
    const s=80+d+Math.random()*25;
    el.style.cssText=`left:${x}px;top:${y}px;width:${s}px;height:${s}px;animation-duration:${1+d*.003}s`;
    rl.appendChild(el);el.addEventListener('animationend',()=>el.remove());
  },d));
}
document.addEventListener('click',e=>ripples(e.clientX,e.clientY));

/* Botón */
const btn=document.getElementById('btn'),bl=document.getElementById('bl');
let busy=false;
btn.addEventListener('click',()=>{
  if(!busy){busy=true;bl.textContent='Conectando...';
  setTimeout(()=>bl.textContent='Sistema activo',1800);
  setTimeout(()=>{bl.textContent='Inicializar';busy=false;},4200);}
});
})();
</script>
</body>
</html>
