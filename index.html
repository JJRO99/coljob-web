<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColJob — El futuro del trabajo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --orange: #ff6a00; --black: #080808; --white: #ffffff; }
  * { cursor: none !important; }

  html, body {
    width: 100%; height: 100%;
    background: var(--black); color: var(--white);
    font-family: 'Inter', system-ui, sans-serif;
    overflow: hidden; -webkit-font-smoothing: antialiased;
  }

  /* Cursor: solo un punto naranja limpio */
  #cur-dot {
    position: fixed; pointer-events: none; z-index: 9999;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--orange);
    box-shadow: 0 0 10px 2px rgba(255,106,0,0.6);
    transform: translate(-50%,-50%);
    transition: width .15s, height .15s, box-shadow .15s;
  }
  /* Campo magnético: anillo pulsante alrededor del cursor */
  #cur-field {
    position: fixed; pointer-events: none; z-index: 9998;
    border-radius: 50%;
    border: 1px solid rgba(255,106,0,0.18);
    transform: translate(-50%,-50%);
    width: 120px; height: 120px;
    animation: fieldPulse 2.2s ease-in-out infinite;
  }
  @keyframes fieldPulse {
    0%,100% { border-color: rgba(255,106,0,0.18); box-shadow: 0 0 0 0 rgba(255,106,0,0.0); }
    50%      { border-color: rgba(255,106,0,0.32); box-shadow: 0 0 18px 4px rgba(255,106,0,0.06); }
  }

  /* Todos los símbolos son canvas-manejados, este layer solo sirve de contenedor */
  #sym-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

  canvas#bg { position: fixed; inset: 0; z-index: 0; }
  #nc        { position: fixed; inset: 0; pointer-events: none; z-index: 9; }

  .ripple-layer { position: fixed; inset:0; pointer-events:none; z-index:10; }
  .ripple {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(255,106,0,0.5);
    transform: translate(-50%,-50%) scale(0);
    animation: ripOut 1.5s cubic-bezier(0.2,0.6,0.4,1) forwards;
  }
  @keyframes ripOut {
    0%   { transform: translate(-50%,-50%) scale(0); opacity:1; }
    100% { transform: translate(-50%,-50%) scale(1); opacity:0; }
  }

  /* ── Layout ── */
  .scene {
    position: fixed; inset: 0; z-index: 2;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem; text-align: center;
  }

  .logo-img-wrap {
    margin-bottom: 1.4rem; opacity: 0;
    transform: translateY(-14px) scale(0.9);
    animation: riseScale 1s cubic-bezier(0.4,0,0.2,1) 0.1s forwards;
  }
  .logo-img {
    width: 76px; height: auto;
    filter: drop-shadow(0 0 12px rgba(255,106,0,0.3));
    transition: filter .4s, transform .4s;
  }
  .logo-img:hover {
    filter: drop-shadow(0 0 24px rgba(255,106,0,0.65));
    transform: scale(1.08);
  }

  .wordmark {
    display: flex; align-items: center; gap: .6rem;
    margin-bottom: 3rem; opacity: 0; transform: translateY(-10px);
    animation: rise .9s ease .35s forwards;
  }
  .wm-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--orange); box-shadow: 0 0 10px rgba(255,106,0,.7);
    flex-shrink: 0; animation: blinkDot 2.6s ease-in-out infinite 2.5s;
  }
  @keyframes blinkDot {
    0%,100% { box-shadow: 0 0 10px rgba(255,106,0,.7); }
    50%      { box-shadow: 0 0 3px rgba(255,106,0,.2); }
  }
  .wm-text { font-size: 1.1rem; font-weight: 700; letter-spacing: .3em; text-transform: uppercase; color: var(--white); }
  .wm-text span { color: var(--orange); }
  .wm-bar { width: 1px; height: 18px; background: rgba(255,255,255,.15); margin-left: .2rem; }
  .wm-tag { font-size: .62rem; letter-spacing: .18em; color: rgba(255,255,255,.28); text-transform: uppercase; font-weight: 400; margin-left: .2rem; }

  .headline {
    max-width: 590px; font-size: clamp(1.35rem,3.6vw,2rem);
    font-weight: 300; line-height: 1.65; letter-spacing: -.01em;
    color: rgba(255,255,255,.90); opacity: 0; transform: translateY(16px);
    animation: rise 1s ease .6s forwards;
  }
  .headline em  { font-style: normal; font-weight: 600; color: var(--white); }
  .headline .acc { color: var(--orange); font-weight: 500; }

  .pulse-dot {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 50%; background: var(--orange);
    margin-right: .45rem; vertical-align: middle; position: relative; top: -2px;
    animation: pdot 2.8s ease-in-out infinite 2.2s;
  }
  @keyframes pdot {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,106,0,.55); }
    50%      { box-shadow: 0 0 0 9px rgba(255,106,0,0); }
  }

  .sub { margin-top: 1.1rem; font-size: .76rem; color: rgba(255,255,255,.25); letter-spacing: .1em; opacity: 0; animation: rise 1s ease .9s forwards; }

  .cta-wrap { margin-top: 3rem; opacity: 0; animation: rise 1s ease 1.1s forwards; }

  #btn {
    position: relative; display: inline-flex; align-items: center; gap: .6rem;
    padding: .88rem 2.5rem; background: transparent;
    border: 1px solid rgba(255,106,0,.45); border-radius: 2px;
    color: var(--orange); font-family: inherit; font-size: .74rem; font-weight: 600;
    letter-spacing: .22em; text-transform: uppercase; overflow: hidden; outline: none;
    transition: color .3s, border-color .3s; z-index: 0;
  }
  #btn::before {
    content: ''; position: absolute; inset: 0; background: var(--orange);
    transform: scaleX(0); transform-origin: left;
    transition: transform .38s cubic-bezier(.4,0,.2,1); z-index: -1;
  }
  #btn:hover::before { transform: scaleX(1); }
  #btn:hover { color: #080808; border-color: var(--orange); }
  #btn:active { transform: scale(.97); }

  .btn-ring {
    width: 13px; height: 13px; border: 1.5px solid currentColor; border-radius: 50%;
    position: relative; flex-shrink: 0; transition: transform .35s ease;
  }
  .btn-ring::after {
    content: ''; position: absolute; top:50%; left:50%;
    transform: translate(-50%,-50%); width: 4px; height: 4px; border-radius: 50%; background: currentColor;
  }
  #btn:hover .btn-ring { transform: rotate(90deg); }

  .footer {
    position: fixed; bottom:1.8rem; left:50%; transform:translateX(-50%);
    font-size: .64rem; letter-spacing:.14em; color: rgba(255,255,255,.13);
    z-index:3; white-space:nowrap; opacity:0; animation: rise 1s ease 1.9s forwards;
  }

  @keyframes rise      { to { opacity:1; transform:translateY(0); } }
  @keyframes riseScale { to { opacity:1; transform:translateY(0) scale(1); } }

  @media (max-width:480px) {
    .headline { font-size: 1.15rem; line-height: 1.7; }
    .wordmark  { margin-bottom: 2rem; }
    .cta-wrap  { margin-top: 2rem; }
    .wm-bar, .wm-tag { display: none; }
    .logo-img  { width: 58px; }
  }
</style>
</head>

<script>
(function(){

  /* ════════════════════════════════════
     CURSOR — punto + campo magnético
  ════════════════════════════════════ */
  const curDot   = document.getElementById('cur-dot');
  const curField = document.getElementById('cur-field');
  let mx = window.innerWidth/2, my = window.innerHeight/2;
  let cx = mx, cy = my;

  document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });

  /* Dot va directo al mouse, field con leve lag */
  let fx=mx, fy=my;
  function tickCursor() {
    cx += (mx-cx)*0.55;
    cy += (my-cy)*0.55;
    fx += (mx-fx)*0.12;
    fy += (my-fy)*0.12;
    curDot.style.left   = mx+'px';
    curDot.style.top    = my+'px';
    curField.style.left = fx+'px';
    curField.style.top  = fy+'px';
    requestAnimationFrame(tickCursor);
  }
  tickCursor();

  document.addEventListener('mousedown', ()=>{
    curDot.style.width='10px'; curDot.style.height='10px';
    curDot.style.boxShadow='0 0 18px 6px rgba(255,106,0,0.8)';
  });
  document.addEventListener('mouseup', ()=>{
    curDot.style.width='6px'; curDot.style.height='6px';
    curDot.style.boxShadow='0 0 10px 2px rgba(255,106,0,0.6)';
  });

  /* ════════════════════════════════════
     CANVAS SETUP
  ════════════════════════════════════ */
  const W = ()=>window.innerWidth, H = ()=>window.innerHeight;

  const bg   = document.getElementById('bg');
  const bctx = bg.getContext('2d');
  const sc   = document.getElementById('sym-canvas');
  const sctx = sc.getContext('2d');
  const nc   = document.getElementById('nc');
  const nctx = nc.getContext('2d');

  function resize(){
    bg.width=sc.width=nc.width=W();
    bg.height=sc.height=nc.height=H();
  }
  resize();
  window.addEventListener('resize', resize);

  /* ════════════════════════════════════
     NODOS DE FONDO
  ════════════════════════════════════ */
  const nodes=[];
  for(let i=0;i<55;i++) nodes.push({
    x:Math.random()*W(), y:Math.random()*H(),
    vx:(Math.random()-.5)*.28, vy:(Math.random()-.5)*.28,
    r:Math.random()*1.8+.5, orange:Math.random()<.13
  });

  function drawBg(){
    bctx.clearRect(0,0,W(),H());
    for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
      const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<145){
        bctx.strokeStyle=`rgba(255,255,255,${(1-d/145)*.12})`;
        bctx.lineWidth=.5;
        bctx.beginPath(); bctx.moveTo(nodes[i].x,nodes[i].y);
        bctx.lineTo(nodes[j].x,nodes[j].y); bctx.stroke();
      }
    }
    nodes.forEach(n=>{
      bctx.beginPath(); bctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      bctx.fillStyle=n.orange?'rgba(255,106,0,0.6)':'rgba(255,255,255,0.35)';
      bctx.fill();
      n.x+=n.vx; n.y+=n.vy;
      if(n.x<-20)n.x=W()+20; if(n.x>W()+20)n.x=-20;
      if(n.y<-20)n.y=H()+20; if(n.y>H()+20)n.y=-20;
    });
    requestAnimationFrame(drawBg);
  }
  drawBg();

  /* ════════════════════════════════════
     SÍMBOLOS MAGNÉTICOS
     Cada símbolo cae libremente.
     Al entrar en el radio del cursor
     es atraído, orbita brevemente y
     luego explota/desaparece.
  ════════════════════════════════════ */
  const SYMS = ['01','10','{}','[]','//','fn','λ','∞','AI','↗','→','◦','</>','0x','if','ml','==','!=','&&','#'];
  const MAGNET_R   = 130;   // radio de atracción
  const ORBIT_R    = 28;    // radio de órbita final
  const ATTRACT_F  = 0.055; // fuerza de atracción
  const ORBIT_SPD  = 0.055; // velocidad angular de órbita

  class Sym {
    constructor(){
      this.reset(true);
    }
    reset(initial=false){
      this.x    = Math.random()*W();
      this.y    = initial ? Math.random()*H() : -20;
      this.vy   = Math.random()*0.45+0.12;  // caída libre
      this.vx   = (Math.random()-.5)*0.2;
      this.text = SYMS[Math.floor(Math.random()*SYMS.length)];
      this.size = Math.random()*8+9;
      this.orange = Math.random()<0.22;
      this.alpha  = Math.random()*0.18+0.12;
      // estado magnético
      this.state  = 'free';   // free | attracted | orbiting | dying
      this.orbitAngle = Math.random()*Math.PI*2;
      this.orbitR = ORBIT_R + Math.random()*18;
      this.dyingAge = 0;
    }
    update(){
      if(this.state==='free'){
        const dx=mx-this.x, dy=my-this.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<MAGNET_R){
          this.state='attracted';
        } else {
          this.x+=this.vx; this.y+=this.vy;
          if(this.y>H()+30) this.reset();
        }
      }
      else if(this.state==='attracted'){
        const dx=mx-this.x, dy=my-this.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        // acelerar hacia el cursor
        this.vx += dx*ATTRACT_F;
        this.vy += dy*ATTRACT_F;
        // amortiguación para no irse al infinito
        this.vx *= 0.72;
        this.vy *= 0.72;
        this.x += this.vx;
        this.y += this.vy;
        if(dist<this.orbitR+4){
          this.state='orbiting';
          // calcular ángulo inicial de órbita desde posición actual
          this.orbitAngle = Math.atan2(this.y-my, this.x-mx);
          this.orbitLife  = 0;
        }
      }
      else if(this.state==='orbiting'){
        this.orbitAngle += ORBIT_SPD;
        this.orbitLife++;
        // ir encogiendo el radio mientras orbita
        this.orbitR = Math.max(0, this.orbitR - 0.18);
        this.x = mx + Math.cos(this.orbitAngle)*this.orbitR;
        this.y = my + Math.sin(this.orbitAngle)*this.orbitR;
        // después de ~1.5s en órbita → morir
        if(this.orbitLife>90 || this.orbitR<4){
          this.state='dying';
          this.dyingAge=0;
        }
      }
      else if(this.state==='dying'){
        this.dyingAge++;
        // el símbolo estalla: se expande y desvanece
        this.x += (Math.cos(this.orbitAngle)*this.dyingAge*0.4);
        this.y += (Math.sin(this.orbitAngle)*this.dyingAge*0.4);
        if(this.dyingAge>18) this.reset();
      }
    }
    draw(ctx){
      let a = this.alpha;
      if(this.state==='attracted'){
        // aumentar opacidad al acercarse
        const dist=Math.sqrt((mx-this.x)**2+(my-this.y)**2);
        a = this.alpha + (1-dist/MAGNET_R)*0.55;
      }
      if(this.state==='orbiting'){
        a = 0.55 + Math.sin(this.orbitLife*0.12)*0.2;
      }
      if(this.state==='dying'){
        a = Math.max(0, 0.7 - this.dyingAge/18*0.7);
        // escalar el texto al explotar
        ctx.save();
        const scale = 1 + this.dyingAge*0.12;
        ctx.translate(this.x, this.y);
        ctx.scale(scale, scale);
        ctx.globalAlpha = a;
        ctx.fillStyle   = this.orange ? '#ff6a00' : '#ffffff';
        ctx.font        = `300 ${this.size}px Inter,monospace`;
        ctx.textAlign   = 'center';
        ctx.textBaseline= 'middle';
        ctx.fillText(this.text, 0, 0);
        ctx.restore();
        return;
      }
      ctx.globalAlpha  = a;
      ctx.fillStyle    = this.orange ? '#ff6a00' : '#ffffff';
      ctx.font         = `300 ${this.size}px Inter,monospace`;
      ctx.textAlign    = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(this.text, this.x, this.y);
    }
  }

  const syms = [];
  for(let i=0;i<38;i++) syms.push(new Sym());

  function drawSyms(){
    sctx.clearRect(0,0,W(),H());
    sctx.save();
    syms.forEach(s=>{ s.update(); s.draw(sctx); });
    sctx.globalAlpha=1;
    sctx.restore();
    requestAnimationFrame(drawSyms);
  }
  drawSyms();

  /* ════════════════════════════════════
     BURST al hacer click
  ════════════════════════════════════ */
  let burst=null;
  function spawnBurst(bx,by){
    const pts=[];
    for(let i=0;i<42;i++){
      const a=(i/42)*Math.PI*2+Math.random()*.5, s=Math.random()*3+.8;
      pts.push({x:bx,y:by,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:Math.random()*2.2+.8,orange:i%5===0,c:[(i+1)%42,(i+4)%42]});
    }
    burst={pts,age:0};
  }
  function drawBurst(){
    if(burst){
      nctx.clearRect(0,0,W(),H());
      burst.age++;
      const d=Math.max(0,1-burst.age/80);
      burst.pts.forEach(p=>{p.vx*=.95;p.vy*=.95;p.x+=p.vx;p.y+=p.vy;});
      burst.pts.forEach(p=>{
        p.c.forEach(j=>{
          const q=burst.pts[j], dx=p.x-q.x, dy=p.y-q.y, dist=Math.sqrt(dx*dx+dy*dy);
          if(dist<280){
            nctx.strokeStyle=`rgba(255,106,0,${(1-dist/280)*d*.7})`;
            nctx.lineWidth=.8;
            nctx.beginPath(); nctx.moveTo(p.x,p.y); nctx.lineTo(q.x,q.y); nctx.stroke();
          }
        });
        nctx.beginPath(); nctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        nctx.fillStyle=p.orange?`rgba(255,106,0,${d*.9})`:`rgba(255,255,255,${d*.55})`;
        nctx.fill();
      });
      if(burst.age>80){nctx.clearRect(0,0,W(),H()); burst=null;}
    }
    requestAnimationFrame(drawBurst);
  }
  drawBurst();

  /* ════════════════════════════════════
     RIPPLES
  ════════════════════════════════════ */
  function ripples(x,y){
    const layer=document.getElementById('rl');
    [0,200,420,650].forEach(delay=>{ setTimeout(()=>{
      const el=document.createElement('div'); el.className='ripple';
      const sz=480+Math.random()*380;
      el.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;animation-duration:${1.4+Math.random()*.35}s;`;
      layer.appendChild(el); el.addEventListener('animationend',()=>el.remove());
    },delay);});
  }

  /* ════════════════════════════════════
     BOTÓN
  ════════════════════════════════════ */
  const btn=document.getElementById('btn'), lbl=document.getElementById('btn-label');
  let busy=false;
  btn.addEventListener('click',()=>{
    const r=btn.getBoundingClientRect();
    ripples(r.left+r.width/2, r.top+r.height/2);
    spawnBurst(r.left+r.width/2, r.top+r.height/2);
    if(!busy){
      busy=true; lbl.textContent='Conectando...';
      setTimeout(()=>{ lbl.textContent='Sistema activo'; },1800);
      setTimeout(()=>{ lbl.textContent='Inicializar'; busy=false; },4200);
    }
  });

})();
</script>
