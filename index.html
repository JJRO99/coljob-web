<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColJob | Estamos Preparando Algo Lindo</title>
    <style>
        /* --- ESTILOS GENERALES Y COLORES SUAVES --- */
        :root {
            --naranja: #FF6600;
            --naranja-palido: #FFD6BC; /* Para la estela del cursor */
            --negro: #111111; /* Negro suave, no puro */
            --blanco-hueso: #FEFDF5; /* Fondo ultra-suave y acogedor */
            --gris-suave: #E0E0E0;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--blanco-hueso);
            color: var(--negro);
            font-family: 'Poppins', 'Helvetica Neue', sans-serif; /* Tipografía amable y moderna */
            overflow: hidden; /* Importante para el confeti */
            display: flex; justify-content: center; align-items: center;
        }

        /* --- FONDO DE MINIATURAS (SVG) --- */
        /* Usamos un patrón SVG ligero para las caricaturas vistas desde el techo */
        .background-pattern {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23FF6600' fill-opacity='0.08'%3E%3Ccircle cx='15' cy='15' r='5'/%3E%3Crect x='10' y='25' width='10' height='2' rx='1'/%3E%3Ccircle cx='50' cy='50' r='5'/%3E%3Crect x='45' y='60' width='10' height='2' rx='1'/%3E%3Ccircle cx='85' cy='85' r='5'/%3E%3Crect x='80' y='95' width='10' height='2' rx='1'/%3E%3Ccircle cx='85' cy='15' r='5'/%3E%3Crect x='80' y='25' width='10' height='2' rx='1'/%3E%3Ccircle cx='15' cy='85' r='5'/%3E%3Crect x='10' y='95' width='10' height='2' rx='1'/%3E%3C/g%3E%3C/svg%3E");
            background-size: 150px 150px;
            z-index: 1;
            opacity: 0.6;
        }

        /* --- CONTENEDOR PRINCIPAL 'COZY' --- */
        .main-container {
            text-align: center;
            z-index: 10;
            padding: 40px;
            background: rgba(254, 253, 245, 0.9); /* Casi opaco para legibilidad */
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); /* Sombra muy sutil */
            max-width: 90%;
            width: 480px;
            opacity: 0;
            animation: fadeInSlight 1s ease-out forwards;
        }

        /* --- ESTILOS DEL LOGO --- */
        .logo-container {
            margin-bottom: 35px;
        }

        .logo-final {
            max-width: 160px;
            height: auto;
            filter: drop-shadow(0 2px 5px rgba(255, 102, 0, 0.1));
            transition: transform 0.3s ease-out;
        }

        /* Micro-interacción: El logo se balancea suavemente al hover */
        .logo-container:hover .logo-final {
            transform: rotate(3deg) scale(1.02);
        }

        /* --- TIPOGRAFÍA Y TEXTOS AMABLES --- */
        h1 {
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0 0 15px 0;
            color: rgba(17, 17, 17, 0.6);
        }

        h1 span {
            color: var(--naranja);
            font-weight: 700;
        }

        .status-msg {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--negro);
            margin: 0 0 45px 0;
            line-height: 1.2;
        }

        /* --- BOTÓN 'SOFT' --- */
        .btn-notify {
            background-color: var(--naranja);
            color: var(--blanco-hueso);
            border: none;
            padding: 16px 45px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px; /* Bordes muy redondeados */
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 102, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .btn-notify:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 102, 0, 0.3);
            background-color: #FF751A; /* Un naranja un poco más claro */
        }

        /* Micro-interacción: Un brillo suave que recorre el botón */
        .btn-notify::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 100%);
            transform: skewX(-25deg);
            transition: 0.7s;
        }

        .btn-notify:hover::before {
            left: 150%;
        }

        /* --- ESTELA DEL CURSOR (CONFITE) --- */
        .confetti {
            position: fixed;
            width: 10px; height: 10px;
            background-color: var(--naranja);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transform: scale(0);
            animation: confettiFall 1s ease-out forwards;
        }

        /* --- ANIMACIONES CSS --- */
        @keyframes fadeInSlight {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes confettiFall {
            0% { opacity: 1; transform: scale(1) translateY(0) rotate(0deg); }
            100% { opacity: 0; transform: scale(0.5) translateY(50px) rotate(360deg); }
        }

        /* Responsividad */
        @media (max-width: 600px) {
            .status-msg { font-size: 1.8rem; }
            h1 { font-size: 0.9rem; letter-spacing: 2px; }
            .logo-final { max-width: 130px; }
            .main-container { padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="background-pattern"></div>

    <div class="main-container">
        
        <div class="logo-container">
            <img src="logo_ColJob.png" alt="Logo ColJob" class="logo-final">
        </div>

        <h1>Estamos preparando <span>ColJob</span></h1>
        
        <p class="status-msg">El espacio para<br>tu talento.</p>

        <button class="btn-notify" id="notify-btn">
            Avísame
        </button>

    </div>

    <script>
        // 1. Efecto de Estela de Confeti (Cursor Trail)
        document.addEventListener('mousemove', (e) => {
            // Solo crear confeti si el mouse se mueve rápido para no saturar
            if (Math.random() > 0.85) { 
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                // Color aleatorio (naranja o blanco)
                const colors = ['#FF6600', '#FFD6BC', '#FFFFFF'];
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // Posición inicial en el cursor
                confetti.style.left = (e.clientX - 5) + 'px';
                confetti.style.top = (e.clientY - 5) + 'px';
                
                // Tamaño aleatorio sutil
                const size = Math.random() * 8 + 4;
                confetti.style.width = confetti.style.height = size + 'px';

                document.body.appendChild(confetti);
                
                // Borrar después de la animación
                setTimeout(() => {
                    confetti.remove();
                }, 1000);
            }
        });

        // 2. Efecto de Clic Lúdico (Alerta)
        const btn = document.getElementById('notify-btn');
        btn.addEventListener('click', function() {
            alert('¡Gracias! Te avisaremos cuando ColJob abra sus puertas virtuales.');
        });
    </script>

</body>
</html>
